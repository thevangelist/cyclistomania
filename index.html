  function rotPoint(body, lx, ly) {            // body local point -> world
    const c = Math.cos(body.angle), s = Math.sin(body.angle);
    return { x: body.position.x + lx * c - ly * s, y: body.position.y + lx * s + ly * c };
  }
  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  // Attaches the wheel to the chassis as a rigid axle (no give).
  function pinWheel(ax1, ay1, ax2, ay2, wheel) {
    Composite.add(world, Constraint.create({
      bodyA: chassis,
      pointA: { x: ax1, y: ay1 },
      bodyB: wheel,
      pointB: { x: 0, y: 0 },
      length: 0,
      stiffness: 1,
      damping: 0,
      render: { visible: false },
    }));
  }

  function addGroundSlab(a, b) {
    const thick = 60;
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    const ang = Math.atan2(dy, dx);
    const nx = -Math.sin(ang), ny = Math.cos(ang);   // downward normal
    const cx = (a.x + b.x) / 2 + nx * thick / 2;
    const cy = (a.y + b.y) / 2 + ny * thick / 2;
    const slab = Bodies.rectangle(cx, cy, len + 2, thick, {
      isStatic: true, angle: ang, friction: 1, label: "ground", chamfer: { radius: 2 },
    });
    Composite.add(world, slab);
  }

  function appendGroundUntil(targetX) {
    if (!groundPts.length) {
      groundStartX = INITIAL_TRACK_START_X;
      groundPts.push({ x: groundStartX, y: terrainHeight(groundStartX) });
      groundBuiltUntilX = groundStartX;
    }
    while (groundBuiltUntilX < targetX) {
      const ax = groundBuiltUntilX;
      const bx = ax + CFG.seg;
      const a = groundPts[groundPts.length - 1];
      const b = { x: bx, y: terrainHeight(bx) };
      groundPts.push(b);
      addGroundSlab(a, b);
      groundBuiltUntilX = bx;
    }
  }

  function buildWorld() {
    engine = Engine.create();
    world = engine.world;
    engine.world.gravity.y = CFG.gravity;
    engine.positionIterations = 12;
    engine.velocityIterations = 12;
    engine.constraintIterations = 12;            // more iterations -> constraints stay stiffer

    // Terrain: points + static segment slabs following the slope
    groundPts = [];
    groundStartX = INITIAL_TRACK_START_X;
    groundBuiltUntilX = groundStartX;
    appendGroundUntil(INITIAL_TRACK_END_X);
    buildDeco();

    // Bike: two wheels + chassis, own collision group (no self-collision)
    const grp = Body.nextGroup(true);
    const filter = { group: grp };
    const sx = 120;
    const sy = terrainHeight(sx) - 70;
    const wb = CFG.wheelbase, r = CFG.wheelR;

    rear = Bodies.circle(sx - wb / 2, sy, r, {
      friction: 1, frictionStatic: 4, restitution: 0.0, density: 0.0022,
      frictionAir: CFG.airDrag, collisionFilter: filter, label: "wheel",
    });
    front = Bodies.circle(sx + wb / 2, sy, r, {
      friction: 1, frictionStatic: 4, restitution: 0.0, density: 0.0016,
      frictionAir: CFG.airDrag, collisionFilter: filter, label: "wheel",
    });
    chassis = Bodies.rectangle(sx, sy - 16, 56, 8, {
      density: 0.0016, frictionAir: CFG.airDrag, collisionFilter: filter, label: "chassis",
    });
    Composite.add(world, [rear, front, chassis]);

    // Rigid axle mounts: wheel center fixed to a chassis point
    pinWheel(-wb / 2, 16, 0, 0, rear);
    pinWheel( wb / 2, 16, 0, 0, front);

    // Crash happens ONLY from the head hitting -> checked geometrically in the loop.
    // Chassis and wheels may touch the ground freely (like in Elastomania).
    spawnX = sx;
    finishX = spawnX + LEVEL_LENGTH_M * pxPerMeter();
    buildMiniProfile();
    buildCollectibles();
    tripMeters = 0;
    lastRearAngle = rear.angle;
    facing = 1;
    frontFootDir = { x: 1, y: 0.08 };
    rearFootDir = { x: 1, y: 0.08 };
    state = "play";
    endT = 0;
    moveStartT = 0;
    timerStarted = false;
    collectedCount = 0;
  }

  function buildMiniProfile() {
    // Esilasketaan ala-HUD:n profiili, tarkoituksella yksinkertaistettuna.
    const samples = devMode ? 90 : 180;
    miniProfile = [];
    miniProfileMinY = Infinity;
    miniProfileMaxY = -Infinity;

    const len = Math.max(1, finishX - spawnX);
    for (let i = 0; i < samples; i++) {
      const t = samples <= 1 ? 0 : (i / (samples - 1));
      const x = spawnX + len * t;
      const y = terrainHeight(x, { micro: false, nano: false, jumps: false, profileSimple: true });
      miniProfile.push({ t, y });
      if (y < miniProfileMinY) miniProfileMinY = y;
      if (y > miniProfileMaxY) miniProfileMaxY = y;
    }

    if (!isFinite(miniProfileMinY) || !isFinite(miniProfileMaxY) || miniProfileMaxY <= miniProfileMinY) {
      miniProfileMinY = 0;
      miniProfileMaxY = 1;
    }
  }

  function buildCollectibles() {
    collectibles = [];
    collectiblePlanXs = [];
    collectiblePlanIdx = 0;

    const points = [];
    if (devMode) {
      points.push(spawnX + 150, spawnX + 290, spawnX + 430);
    } else {
      const startX = spawnX + 1200;
      const endX = finishX - 700;
      const total = 24;
      for (let i = 0; i < total; i++) {
        const t = i / (total - 1);
        const baseX = startX + (endX - startX) * t;
        const jitter = (hash(i * 37 + 11) * 2 - 1) * 560;
        const x = Math.max(startX, Math.min(endX, baseX + jitter));
        points.push(x);
      }
    }

    points.sort((a, b) => a - b);
    for (const x of points) {
      if (collectiblePlanXs.some((px) => Math.abs(px - x) < 420)) continue;
      collectiblePlanXs.push(x);
    }

    // Dev-modessa voidaan luoda kaikki heti; pitkassa kentassa spawnataan lahialueelle loopissa.
    if (devMode) {
      spawnCollectiblesAhead(spawnX + 2000);
    } else {
      spawnCollectiblesAhead(spawnX + 2600);
    }
  }

  function spawnCollectiblesAhead(targetX) {
    while (collectiblePlanIdx < collectiblePlanXs.length && collectiblePlanXs[collectiblePlanIdx] <= targetX) {
      const x = collectiblePlanXs[collectiblePlanIdx++];
      const yl = groundYAt(x - 90);
      const yc = groundYAt(x);
      const yr = groundYAt(x + 90);
      const isDip = yc > yl + 8 && yc > yr + 8;
      const isCrest = yc < yl - 9 && yc < yr - 9;
      const yOff = isDip ? 44 : (isCrest ? 70 : 58);
      collectibles.push({ x, y: yc - yOff, taken: false, fade: 0 });
    }
    collectibles.sort((a, b) => a.x - b.x);
  }

  // --- Terrain height at a given x (linear interpolation) -------
  function groundYAt(x) {
    appendGroundUntil(x + CFG.seg * 4);
    const idx = Math.max(0, Math.min(groundPts.length - 2, Math.floor((x - groundStartX) / CFG.seg)));
    const a = groundPts[idx], b = groundPts[idx + 1];
    const t = (x - a.x) / (b.x - a.x);
    return a.y + (b.y - a.y) * Math.max(0, Math.min(1, t));
  }

  // Rear drive: power reaches the road only when the rear wheel actually touches the ground.
  function rearWheelGrounded() {
    return !!rear && (rear.position.y + CFG.wheelR) >= (groundYAt(rear.position.x) - 3);
  }
  function frontWheelGrounded() {
    return !!front && (front.position.y + CFG.wheelR) >= (groundYAt(front.position.x) - 3);
  }
  // Wheelie: rear on the ground, front in the air.
  function isWheelie() {
    return rearWheelGrounded() && !frontWheelGrounded();
  }

  function liftBikeAboveGround(clearance = 1.0) {
    // Check the bike's and rider's critical points relative to the ground.
    const head = rotPoint(chassis, 8, -36);
    const hip = rotPoint(chassis, -12.8, -20.2);
    const shoulder = rotPoint(chassis, 15, -45);
    const hand = rotPoint(chassis, 28, -18);
    const bb = rotPoint(chassis, -4, 15);
    const frontFork = rotPoint(chassis, 24, -5);

    const samples = [head, hip, shoulder, hand, bb, frontFork];
    let maxPenetration = 0;
    for (const p of samples) {
      const pen = p.y - (groundYAt(p.x) - clearance);
      if (pen > maxPenetration) maxPenetration = pen;
    }

    const rearPen = rear.position.y + CFG.wheelR - (groundYAt(rear.position.x) - 0.2);
    const frontPen = front.position.y + CFG.wheelR - (groundYAt(front.position.x) - 0.2);
    if (rearPen > maxPenetration) maxPenetration = rearPen;
    if (frontPen > maxPenetration) maxPenetration = frontPen;

    if (maxPenetration > 0) {
      const lift = maxPenetration + 0.8;
      Body.setPosition(rear, { x: rear.position.x, y: rear.position.y - lift });
      Body.setPosition(front, { x: front.position.x, y: front.position.y - lift });
      Body.setPosition(chassis, { x: chassis.position.x, y: chassis.position.y - lift });
    }
  }

  function freezeBikeOnCrash() {
    // Clean up any penetration before stopping.
    for (let i = 0; i < 3; i++) liftBikeAboveGround(1.2);

    Body.setVelocity(rear, { x: 0, y: 0 });
    Body.setVelocity(front, { x: 0, y: 0 });
    Body.setVelocity(chassis, { x: 0, y: 0 });
    Body.setAngularVelocity(rear, 0);
    Body.setAngularVelocity(front, 0);
    Body.setAngularVelocity(chassis, 0);

    Body.setStatic(rear, true);
    Body.setStatic(front, true);
    Body.setStatic(chassis, true);
  }

  function crash() {
    if (state === "play") {
      state = "crash";
      endT = performance.now();
      freezeBikeOnCrash();
      playCrash();
      showOverlay();
    }
  }
  function win() {
    if (state !== "play") return;
    state = "win"; endT = performance.now();
    burgerFade = 1;
    playBurgerEat();
    const t = currentRunMs(endT) / 1000;
    newRecord = (best === null || t < best);
    if (newRecord) { best = t; localStorage.setItem(bestKey, String(best)); }
    showOverlay();
  }

  function reset() {
    Events.off(engine);
    Composite.clear(world, false);
    Engine.clear(engine);
    cam.x = 0; cam.y = 0; cam.zoom = 1; cam.init = false; cam.vX = 0; cam.leadX = 0;
    cadence = 0; cadenceRpm = 0; crankAngle = 0; crankVel = 0; legCrankVel = 0; crankAccum = 0; pedalPulse = 0;
    driveMomentum = 0;
    rollBurst = 0;
    lastScrollMs = 0;
    tripMeters = 0;
    lastRearAngle = rear ? rear.angle : 0;
    burgerFade = 0;
    buildWorld();
    overlay.classList.remove("show");
  }

  function currentRunMs(now) {
    if (!timerStarted || moveStartT <= 0) return 0;
    return Math.max(0, now - moveStartT);
  }

  function maybeStartTimer(now) {
    if (timerStarted || state !== "play") return;
    if (Math.abs(chassis.position.x - spawnX) > 8) {
      timerStarted = true;
      moveStartT = now;
    }
  }

  function startFromIntro() {
    if (!introVisible) return;
    introVisible = false;
    $("intro").classList.add("hide");
    last = performance.now();
  }

  function controlKeyFromEvent(e) {
    const code = e.code || "";
    if (code === "KeyA") return "a";
    if (code === "KeyS") return "s";
    if (code === "KeyD") return "d";
    if (code === "KeyR") return "r";
    if (code === "KeyM") return "m";
    if (code === "Space") return " ";
    if (code === "ArrowUp") return "arrowup";
    if (code === "ArrowDown") return "arrowdown";
    if (code === "ArrowLeft") return "arrowleft";
    if (code === "ArrowRight") return "arrowright";
    return (e.key || "").toLowerCase();
  }

  function setMuted(nextMuted) {
    muted = !!nextMuted;
    if (!muted) unlockAudio();
    const tgl = document.getElementById("soundToggle");
    if (tgl) tgl.checked = !muted;
  }

  const DEFAULT_MUTED = false;

  // --- Input ------------------------------------------------------------
  window.addEventListener("keydown", (e) => {
    const k = controlKeyFromEvent(e);
    if (["a", "s", "d", " ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k)) e.preventDefault();
    unlockAudio();
    startFromIntro();
    if (k === "r") { reset(); return; }
    if (k === "m") { setMuted(!muted); return; }
    // Direction flip removed for now.
    keys[k] = true;
  });
  window.addEventListener("keyup", (e) => { keys[controlKeyFromEvent(e)] = false; });
  window.addEventListener("pointerdown", () => { unlockAudio(); startFromIntro(); });
  window.addEventListener("mousedown", unlockAudio, { passive: true });
  window.addEventListener("touchstart", unlockAudio, { passive: true });
  const soundToggle = document.getElementById("soundToggle");
  if (soundToggle) {
    soundToggle.checked = !DEFAULT_MUTED;
    soundToggle.addEventListener("change", () => {
      if (soundToggle.checked) unlockAudio();
      setMuted(!soundToggle.checked);
    });
  }

  // --- Audio: light pedal click + terrain/freewheel -------------------
  let actx = null, muted = DEFAULT_MUTED;
  let audioReady = false;
  let terrainNoise = null, terrainFilter = null, terrainGain = null;
  let freewheelTickAccum = 0;
  let rollingGainSmoothed = 0;

  function unlockAudio() {
    ensureAudio();
    if (actx && actx.state === "running") audioReady = true;
  }

  function ensureAudio() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; } }
    if (actx && actx.state === "suspended") {
      actx.resume().then(() => { audioReady = true; }).catch(() => {});
    }
    if (actx && actx.state === "running") audioReady = true;
    if (actx) initPickupBuffer();
    if (actx) initBurgerBuffer();
    if (actx) initExtraBuffers();
    if (!actx || terrainNoise) return;

    const noiseLen = actx.sampleRate * 2;
    const noiseBuf = actx.createBuffer(1, noiseLen, actx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) data[i] = Math.random() * 2 - 1;

    terrainNoise = actx.createBufferSource();
    terrainNoise.buffer = noiseBuf;
    terrainNoise.loop = true;
    terrainFilter = actx.createBiquadFilter();
    terrainFilter.type = "bandpass";
    terrainFilter.frequency.value = 420;
    terrainFilter.Q.value = 0.8;
    terrainGain = actx.createGain();
    terrainGain.gain.value = 0.0001;
    terrainNoise.connect(terrainFilter);
    terrainFilter.connect(terrainGain);
    terrainGain.connect(actx.destination);
    terrainNoise.start();

  }
  function tick(strength) {
    if (muted || !actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "triangle";
    o.frequency.value = (190 + cadence * 320) * (0.92 + Math.random() * 0.16);  // harder pedaling -> higher pitch
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.min(0.07, 0.015 + strength * 0.05), t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.085);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + 0.09);
  }

  function freewheelTick(strength) {
    if (muted || !actx) return;
    const t = actx.currentTime;

    const o = actx.createOscillator();
    const o2 = actx.createOscillator();
    const hp = actx.createBiquadFilter();
    const g = actx.createGain();

    o.type = "square";
    o.frequency.setValueAtTime(1700 + Math.random() * 480, t);
    o.frequency.exponentialRampToValueAtTime(1020 + Math.random() * 280, t + 0.010);
    // A light double-click makes the hub sound more natural.
    o2.type = "triangle";
    o2.frequency.setValueAtTime(1420 + Math.random() * 280, t + 0.0022);
    o2.frequency.exponentialRampToValueAtTime(880 + Math.random() * 180, t + 0.010);

    hp.type = "highpass";
    hp.frequency.value = 980;
    hp.Q.value = 1.1;

    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.min(0.032, 0.006 + strength * 0.020), t + 0.0015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.016);

    o.connect(hp);
    o2.connect(hp);
    hp.connect(g);
    g.connect(actx.destination);
    o.start(t);
    o2.start(t + 0.0022);
    o.stop(t + 0.018);
    o2.stop(t + 0.014);
  }

  // Mouse wheel = pedal stroke. Each notch = a separate impulse.
  window.addEventListener("wheel", (e) => {
    e.preventDefault();
    startFromIntro();
    if (state !== "play") return;
    unlockAudio();
    const wheelDelta = Math.abs(e.deltaY);
    // A long scroll is interpreted as several strokes (max 10).
    const strokeCount = Math.max(1, Math.min(10, 1 + Math.floor(Math.min(1, wheelDelta / 900) * 9)));
    pedalStroke(Math.min(wheelDelta, 220), strokeCount);
  }, { passive: false });

  function pedalStroke(d, strokeCount = 1) {
    const nowMs = performance.now();
    const dtMs = lastScrollMs > 0 ? nowMs - lastScrollMs : 120;
    lastScrollMs = nowMs;

    const raw = d / 100;
    const cadenceBoost = dtMs < CFG.scrollFastMs ? (CFG.scrollFastMs - dtMs) / CFG.scrollFastMs : 0;
    const rearOnGround = rearWheelGrounded();   // rear drive: only when the rear wheel is on the ground
    const grip = rearOnGround ? CFG.groundInputScale : CFG.airInputScale;
    const s = Math.pow(Math.max(0.08, raw), 0.86) * grip;
    const strokes = Math.max(1, Math.min(10, strokeCount | 0));
    const strokeMul = 1 + (strokes - 1) * 0.48;
    crankAccum += s * strokeMul * CFG.crankStep;         // cranks turn by the amount of scrolling

    // Power transmission only when the rear wheel is on the ground (rear drive).
    if (rearOnGround) {
      // Slow scroll -> slow strolling start.
      const dir = facing >= 0 ? 1 : -1;
      const strollMul = 1 - cadenceBoost * 0.65;
      const strollTarget = rear.angularVelocity + dir * s * CFG.strollKick * strollMul * strokeMul * climbResist;
      const strollCap = Math.min(CFG.strollMax, CFG.pedalMax * 0.48);
      const strollClamped = dir > 0
        ? Math.min(strollTarget, strollCap)
        : Math.max(strollTarget, -strollCap);
      Body.setAngularVelocity(rear, strollClamped);

      // Fast consecutive scrolling increases burst and momentum buildup.
      rollBurst = Math.min(1, rollBurst * 0.72 + cadenceBoost * CFG.burstRise + Math.min(0.72, s * 0.08 + (strokes - 1) * 0.06));
      const burstMul = 1 + rollBurst * (CFG.burstBoostMax - 1);

      // The pedal effect accumulates as momentum: a more bike-like start + carrying coast.
      const perStrokeMomentum = Math.min(CFG.inputStepMax, s * CFG.scrollKick * burstMul * climbResist);
      for (let i = 0; i < strokes; i++) {
        driveMomentum = Math.min(CFG.scrollKickMax, driveMomentum + perStrokeMomentum);
      }
    }

    pedalPulse = 1;
    tick(Math.min(1, s * (0.9 + strokes * 0.07)));
  }

  function applyControls() {
    if (state !== "play") return;
    if (keys["s"] || keys["arrowdown"]) {               // brake on both wheels
      Body.setAngularVelocity(rear,  rear.angularVelocity  * CFG.brake);
      Body.setAngularVelocity(front, front.angularVelocity * CFG.brake);
    }
    const leftArrow = !!keys["arrowleft"];
    const rightArrow = !!keys["arrowright"];
    const leftPressed = !!(keys["a"] || leftArrow);
    const rightPressed = !!(keys["d"] || rightArrow);
    leanHoldL = leftPressed ? Math.min(CFG.leanRampMs, leanHoldL + 16.7) : Math.max(0, leanHoldL - 30);
    leanHoldR = rightPressed ? Math.min(CFG.leanRampMs, leanHoldR + 16.7) : Math.max(0, leanHoldR - 30);

    if (leftPressed) {
      const t = leanHoldL / CFG.leanRampMs;
      const mul = 0.4 + t * (CFG.leanMaxMul - 0.4);
      const boost = leftArrow ? CFG.arrowLeanBoost : 1;
      // Wheelie: pedaling at the same time (cadence) speeds up the rotation.
      const pedalBoost = 1 + cadence * CFG.wheeliePedalBoost;
      Body.setAngularVelocity(chassis, chassis.angularVelocity - CFG.lean * mul * boost * pedalBoost);
    }
    if (rightPressed) {
      const t = leanHoldR / CFG.leanRampMs;
      const mul = 0.4 + t * (CFG.leanMaxMul - 0.4);
      const boost = rightArrow ? CFG.arrowLeanBoost : 1;
      Body.setAngularVelocity(chassis, chassis.angularVelocity + CFG.lean * mul * boost);
    }
  }

  function flipDirection() {
    // Only the rider turns and from now on you pedal the other way.
    // Do NOT touch velocity or spin -> the chassis won't break and travel direction
    // won't change as a velocity vector (you keep coasting until you brake and pedal the other way).
    facing *= -1;
    crankVel = 0;
    crankAccum = 0;
    driveMomentum = 0;
    rollBurst = 0;
  }

  function updateRollingAudio(dtMs) {
    if (!actx || !terrainGain) return;
    if (actx.state === "suspended") {
      actx.resume().then(() => { audioReady = true; }).catch(() => {});
    }
    if (muted || state !== "play") {
      terrainGain.gain.setTargetAtTime(0.0001, actx.currentTime, 0.04);
      freewheelTickAccum = 0;
      rollingGainSmoothed = 0;
      return;
    }

    const zoneType = zoneAt(chassis.position.x).type;
    const terrainRough = zoneType === "road" ? 0.18 : zoneType === "city" ? 0.24 : zoneType === "gravel" ? 0.60 : zoneType === "forest" ? 0.48 : 0.38;
    const rearGap = rear.position.y - groundYAt(rear.position.x);
    const frontGap = front.position.y - groundYAt(front.position.x);
    const nearGround = (rearGap > -14) || (frontGap > -14);
    const baseRoll = Math.min(0.09, wheelSpeedKph / 90 * terrainRough * 0.11);
    const rollTarget = nearGround ? baseRoll : Math.min(0.018, baseRoll * 0.28);
    const rollLerp = nearGround ? 0.22 : 0.08;
    rollingGainSmoothed += (rollTarget - rollingGainSmoothed) * rollLerp;
    const rollGain = Math.max(0.0001, rollingGainSmoothed);
    const freq = 180 + terrainRough * 560 + wheelSpeedKph * 3.2;
    terrainFilter.frequency.setTargetAtTime(freq, actx.currentTime, 0.03);
    terrainGain.gain.setTargetAtTime(rollGain, actx.currentTime, 0.04);

    const freewheelOn = wheelSpeedKph > 3 && Math.abs(crankVel) < 0.050;
    if (!freewheelOn) {
      freewheelTickAccum = 0;
      return;
    }

    const dtSec = Math.max(0.001, (dtMs || 16.7) / 1000);
    const wheelRevPerSec = (wheelSpeedKph / 3.6) / Math.max(0.001, wheelCircumferenceM());
    const clickHzRaw = wheelRevPerSec * (FREEWHEEL.hubTeeth / FREEWHEEL.audibleDiv);
    const clickHz = Math.min(FREEWHEEL.maxHz, Math.max(FREEWHEEL.minHz, clickHzRaw));
    const tickStrength = Math.min(1, 0.28 + wheelSpeedKph / 95);
    freewheelTickAccum += dtSec * clickHz;
    while (freewheelTickAccum >= 1) {
      freewheelTick(tickStrength);
      freewheelTickAccum -= 1;
    }
  }

  // --- Camera -----------------------------------------------------------
  const cam = { x: 0, y: 0, zoom: 1, init: false, vX: 0, leadX: 0 };
  function updateCamera() {
    const v = chassis.velocity;
    const speed = Math.hypot(v.x, v.y);
    cam.vX += (v.x - cam.vX) * 0.12;
    const absVX = Math.abs(cam.vX);
    const dir = absVX > 0.08 ? Math.sign(cam.vX) : facing;
    const leadTarget = dir * Math.min(210, absVX * 14.0);
    cam.leadX += (leadTarget - cam.leadX) * 0.08;

    const bikeCenterX = (rear.position.x + front.position.x + chassis.position.x) / 3;
    const tx = bikeCenterX + cam.leadX;
    const ty = chassis.position.y - 34;
    const tz = 1.0; // fixed zoom: no change with speed
    if (!cam.init) { cam.x = tx; cam.y = ty; cam.zoom = tz; cam.init = true; }
    cam.x += (tx - cam.x) * 0.12;
    cam.y += (ty - cam.y) * 0.10;
    cam.zoom += (tz - cam.zoom) * 0.035;
  }

  // --- Rendering -----------------------------------------------------------
  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#8fbfe6");
    g.addColorStop(0.6, "#b8d8f2");
    g.addColorStop(1, "#dcecff");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function worldTransform() {
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cam.x, -cam.y);
  }

  function drawTerrain() {
    // visible x range -> draw only those segments
    const half = (W / 2) / cam.zoom;
    const x0 = cam.x - half - CFG.seg, x1 = cam.x + half + CFG.seg;
    let i0 = Math.max(0, Math.floor((x0 - groundStartX) / CFG.seg));
    let i1 = Math.min(groundPts.length - 1, Math.ceil((x1 - groundStartX) / CFG.seg));

    ctx.beginPath();
    ctx.moveTo(groundPts[i0].x, groundPts[i0].y);
    for (let i = i0 + 1; i <= i1; i++) ctx.lineTo(groundPts[i].x, groundPts[i].y);
    ctx.lineTo(groundPts[i1].x, cam.y + half + H);
    ctx.lineTo(groundPts[i0].x, cam.y + half + H);
    ctx.closePath();
    ctx.fillStyle = "#1c2c1f"; ctx.fill();

    // Road surface line removed by request.
  }
  function surfaceColor(type) {
    switch (type) {
      case "city":   return THEME.terrainCity;
      case "road":   return THEME.terrainRoad;
      case "gravel": return THEME.terrainGravel;
      case "forest": return THEME.terrainForest;
      case "hill":   return THEME.terrainHill;
      default:       return "#5fd07a";
    }
  }

  function drawFinish() {
    const half = (W / 2) / cam.zoom;
    const x0 = cam.x - half - 120;
    const x1 = cam.x + half + 120;
    if (finishX < x0 || finishX > x1) return;

    const fy = groundYAt(finishX);
    if (burgerFade > 0) {
      const fadeNow = burgerFade;
      burgerFade = Math.max(0, burgerFade - 0.05);
      if (sprites.burger.complete && sprites.burger.naturalWidth > 0) {
        const h = 64 * (0.9 + fadeNow * 0.22);
        const w = h * (sprites.burger.naturalWidth / sprites.burger.naturalHeight);
        ctx.save();
        ctx.globalAlpha = fadeNow;
        ctx.drawImage(sprites.burger, finishX - w * 0.5, fy - h - 6, w, h);
        ctx.restore();
      }
      return;
    }
    if (state === "win") return;

    if (sprites.burger.complete && sprites.burger.naturalWidth > 0) {
      const h = 64, w = h * (sprites.burger.naturalWidth / sprites.burger.naturalHeight);
      ctx.drawImage(sprites.burger, finishX - w * 0.5, fy - h - 6, w, h);
      return;
    }

    ctx.fillStyle = "#f0b44c";
    ctx.beginPath();
    ctx.ellipse(finishX, fy - 26, 24, 14, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawMiniProfile() {
    if (!miniProfile.length) return;

    if (!routeProfileCanvas) {
      routeProfileCanvas = $("routeProfile");
      if (routeProfileCanvas) routeProfileCtx = routeProfileCanvas.getContext("2d");
    }
    if (!routeProfileCanvas || !routeProfileCtx) return;

    const w = Math.max(80, Math.floor(routeProfileCanvas.clientWidth || 0));
    const h = Math.max(12, Math.floor(routeProfileCanvas.clientHeight || 0));
    if (routeProfileCanvas.width !== w || routeProfileCanvas.height !== h) {
      routeProfileCanvas.width = w;
      routeProfileCanvas.height = h;
    }

    const g = routeProfileCtx;
    const padX = 6;
    const padY = 2;
    const plotW = Math.max(10, w - padX * 2);
    const plotH = Math.max(6, h - padY * 2);
    const yRange = Math.max(1, miniProfileMaxY - miniProfileMinY);

    g.clearRect(0, 0, w, h);

    g.strokeStyle = "rgba(255,255,255,0.22)";
    g.lineWidth = 1;
    g.beginPath();
    for (let i = 0; i < miniProfile.length; i++) {
      const p = miniProfile[i];
      const px = padX + p.t * plotW;
      const py = padY + ((p.y - miniProfileMinY) / yRange) * plotH;
      if (i === 0) g.moveTo(px, py);
      else g.lineTo(px, py);
    }
    g.stroke();

    const progressT = Math.max(0, Math.min(1, (chassis.position.x - spawnX) / Math.max(1, finishX - spawnX)));
    const markerX = padX + progressT * plotW;
    g.strokeStyle = "rgba(255,255,255,0.78)";
    g.lineWidth = 1.1;
    g.beginPath();
    g.moveTo(markerX, 1);
    g.lineTo(markerX, h - 1);
    g.stroke();
  }

  function drawCollectibles() {
    const half = (W / 2) / cam.zoom;
    const x0 = cam.x - half - 90, x1 = cam.x + half + 90;
    const hasRadler = sprites.radler.complete && sprites.radler.naturalWidth > 0;
    for (const c of collectibles) {
      if (c.x < x0 || c.x > x1) continue;
      if (c.taken && c.fade <= 0) continue;
      const fade = c.taken ? c.fade : 1;
      if (hasRadler) {
        const h = 56 * (c.taken ? (0.88 + fade * 0.34) : 1);
        const w = h * (sprites.radler.naturalWidth / sprites.radler.naturalHeight);
        ctx.save();
        ctx.globalAlpha = fade;
        ctx.drawImage(sprites.radler, c.x - w / 2, c.y - h, w, h);
        ctx.restore();
      } else {
        ctx.save();
        ctx.globalAlpha = fade;
        ctx.fillStyle = "#f5d35d";
        ctx.beginPath();
        ctx.arc(c.x, c.y - 24, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      if (c.taken && c.fade > 0) c.fade = Math.max(0, c.fade - 0.12);
    }
  }

  function pickupCollectibles() {
    const head = rotPoint(chassis, 8, -36);
    const p0 = chassis.position;
    for (const c of collectibles) {
      if (c.taken) continue;
      const d0 = Math.hypot(c.x - p0.x, c.y - p0.y);
      const d1 = Math.hypot(c.x - head.x, c.y - head.y);
      if (Math.min(d0, d1) < 24) {
        c.taken = true;
        c.fade = 1;
        collectedCount += 1;
        // Win jingle only when grabbed during a real player wheelie (lean + pedal combo
        // at or just before the grab); otherwise the normal pickup sound.
        if (performance.now() - lastRealWheelieMs < 350) playWin();
        else playRadlerPickup();
      }
    }
  }

  // --- Roadside decorations ----------------------------------------------
  function drawDeco() {
    return;
  }
  function post(x, gy, top) {                       // post; returns the sign's center height
    ctx.strokeStyle = "#9aa6b2"; ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy - top); ctx.stroke();
    return gy - top;
  }
  function triSign(x, cy, glyph) {                  // yellow warning triangle
    const s = 15;
    ctx.beginPath();
    ctx.moveTo(x, cy - s); ctx.lineTo(x - s, cy + s * 0.85); ctx.lineTo(x + s, cy + s * 0.85); ctx.closePath();
    ctx.fillStyle = "#ffd84d"; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = "#d6352b"; ctx.stroke();
    ctx.fillStyle = "#111"; ctx.font = "bold 13px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(glyph, x, cy + 4);
  }
  function drawDecoItem(kind, x, gy, v) {
    switch (kind) {
      case "tree": {
        return;
        break;
      }
      case "rock": {
        const r = 6 + v * 11;
        ctx.fillStyle = "#6a6f76";
        ctx.beginPath();
        ctx.moveTo(x - r, gy);
        ctx.quadraticCurveTo(x - r, gy - r * 1.15, x, gy - r * 1.15);
        ctx.quadraticCurveTo(x + r, gy - r * 1.15, x + r, gy);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#7d838b";
        ctx.beginPath(); ctx.ellipse(x - r * 0.3, gy - r * 0.7, r * 0.35, r * 0.25, 0, 0, Math.PI * 2); ctx.fill();
        break;
      }
      case "lamp": {
        return;
        break;
      }
      case "light": {                              // traffic light
        return;
        break;
      }
      case "post": {                               // guide post / railing
        return;
        break;
      }
      case "sign:speed": {                         // speed limit
        return;
        break;
      }
      case "sign:stop": {                          // STOP sign
        return;
        break;
      }
      case "sign:warn":
      case "sign:deer":
      case "sign:steep":
        return;
    }
  }

  function drawWheel(wheel) {
    ctx.save();
    ctx.translate(wheel.position.x, wheel.position.y);
    ctx.rotate(wheel.angle);
    const r = CFG.wheelR;
    // Tire + thin rim (spoke style)
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.lineWidth = 3.8; ctx.strokeStyle = "#0a0e14"; ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, r - 1.1, 0, Math.PI * 2);
    ctx.lineWidth = 1.3; ctx.strokeStyle = "#d9c7a2"; ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, r - 2.5, 0, Math.PI * 2);
    ctx.lineWidth = 1.8; ctx.strokeStyle = "#9ca7b4"; ctx.stroke();

    // Spokes
    const spokeCount = 24;
    const spokeR = r - 2.8;
    ctx.beginPath();
    for (let i = 0; i < spokeCount; i++) {
      const ang = (i / spokeCount) * Math.PI * 2;
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(ang) * spokeR, Math.sin(ang) * spokeR);
    }
    ctx.lineWidth = 0.9; ctx.strokeStyle = "#697583"; ctx.stroke();

    // Hub
    ctx.beginPath(); ctx.arc(0, 0, 3.1, 0, Math.PI * 2); ctx.fillStyle = "#cdd4de"; ctx.fill();
    ctx.beginPath(); ctx.arc(0, 0, 1.3, 0, Math.PI * 2); ctx.fillStyle = "#8b96a3"; ctx.fill();
    ctx.restore();
  }

  function drawBike() {
    drawWheel(rear); drawWheel(front);

    // Convert the wheels' world position to local coordinates
    function toLocal(worldPos) {
      const dx = worldPos.x - chassis.position.x;
      const dy = worldPos.y - chassis.position.y;
      const cos = Math.cos(-chassis.angle);
      const sin = Math.sin(-chassis.angle);
      return { x: (dx * cos - dy * sin) * facing, y: dx * sin + dy * cos };
    }
    const rearLocal = toLocal(rear.position);
    const frontLocal = toLocal(front.position);

    // Everything in chassis coordinates (simple and working)
    ctx.save();
    ctx.translate(chassis.position.x, chassis.position.y);
    ctx.rotate(chassis.angle);
    ctx.scale(facing, 1);
    ctx.lineCap = "round"; ctx.lineJoin = "round";

    // Chassis points (local) - larger front triangle
    const bb = { x: -4, y: 15 };        // bottom bracket a bit further back/lower
    const seatTop = { x: -12, y: -16 }; // top of the seat tube
    const headTop = { x: 22, y: -17 };  // top of the head tube forward/up -> longer reach
    const headBot = { x: 24, y: -5 };   // bottom of the head tube forward -> larger front triangle

    // Frame (pro-aero red)
    ctx.strokeStyle = "#d8161d";
    ctx.lineWidth = 4.6;
    ctx.beginPath();
    ctx.moveTo(seatTop.x, seatTop.y); ctx.lineTo(headTop.x, headTop.y);   // top tube
    ctx.moveTo(seatTop.x, seatTop.y); ctx.lineTo(bb.x, bb.y);             // seat tube
    ctx.moveTo(bb.x, bb.y); ctx.lineTo(headTop.x, headTop.y);             // down tube -> toward the handlebar!
    ctx.stroke();

    // Rear triangle, thinner
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(bb.x, bb.y); ctx.lineTo(rearLocal.x, rearLocal.y);         // chainstay
    ctx.moveTo(seatTop.x, seatTop.y); ctx.lineTo(rearLocal.x, rearLocal.y); // seatstay
    ctx.stroke();

    // Dark accent on the down tube (race look)
    ctx.strokeStyle = "#1a1d22";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(bb.x + 1, bb.y - 1);
    ctx.lineTo(headTop.x - 1, headTop.y + 1);
    ctx.stroke();

    // Front fork
    ctx.strokeStyle = "#d8161d";
    ctx.lineWidth = 4.2;
    ctx.beginPath();
    // Head tube straight
    ctx.moveTo(headTop.x, headTop.y);
    ctx.lineTo(headBot.x, headBot.y);
    ctx.stroke();
    
    // Fork - straight and fully rigid
    ctx.beginPath();
    ctx.moveTo(headBot.x, headBot.y);
    ctx.lineTo(frontLocal.x, frontLocal.y);
    ctx.stroke();

    // Saddle
    ctx.strokeStyle = "#24384a";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(seatTop.x - 5, seatTop.y - 2);
    ctx.lineTo(seatTop.x + 4, seatTop.y - 2);
    ctx.stroke();

    // Handlebar + stem (cyclocross/dropbar, J-curve)
    const stem = { x: headTop.x + 3.8, y: headTop.y - 2.6 };
    const hood = { x: stem.x + 5.2, y: stem.y - 0.5 };
    ctx.beginPath();
    ctx.moveTo(headTop.x, headTop.y);
    ctx.lineTo(stem.x, stem.y);
    ctx.lineTo(hood.x, hood.y);
    ctx.bezierCurveTo(
      hood.x + 2.3, hood.y + 1.4,
      hood.x + 1.6, hood.y + 5.0,
      hood.x - 0.8, hood.y + 7.0
    );
    ctx.quadraticCurveTo(hood.x - 2.3, hood.y + 8.0, hood.x - 1.6, hood.y + 8.9);
    ctx.stroke();

    // Bottom bracket
    ctx.fillStyle = "#24384a";
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, 3, 0, Math.PI * 2);
    ctx.fill();

    // Drivetrain: chainring + chain + cassette (simplified)
    const chainringR = 6.6;
    const rearCog = { x: rearLocal.x + 1.6, y: rearLocal.y + 0.4 };
    const rearCogR = 3.2;

    // Chainring
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, chainringR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, chainringR - 2.2, 0, Math.PI * 2);
    ctx.strokeStyle = "#5f6670";
    ctx.lineWidth = 1.1;
    ctx.stroke();

    // Cassette / rear cog
    ctx.fillStyle = "#12161b";
    ctx.beginPath();
    ctx.arc(rearCog.x, rearCog.y, rearCogR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#6f7783";
    ctx.lineWidth = 0.9;
    ctx.stroke();

    // Chain: runs diagonally from the large chainring to the small rear cog
    const chainTopFront = { x: bb.x - chainringR * 0.84, y: bb.y - chainringR * 0.36 };
    const chainTopRear = { x: rearCog.x + rearCogR * 0.92, y: rearCog.y - rearCogR * 0.56 };
    const chainBotFront = { x: bb.x - chainringR * 0.90, y: bb.y + chainringR * 0.40 };
    const chainBotRear = { x: rearCog.x + rearCogR * 0.88, y: rearCog.y + rearCogR * 0.62 };

    ctx.strokeStyle = "#2a2f36";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(chainTopFront.x, chainTopFront.y);
    ctx.lineTo(chainTopRear.x, chainTopRear.y);
    ctx.moveTo(chainBotFront.x, chainBotFront.y);
    ctx.lineTo(chainBotRear.x, chainBotRear.y);
    ctx.stroke();

    // Chain arcs on the cogs (contact points)
    ctx.strokeStyle = "#3a404a";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, chainringR + 0.15, 2.55, 3.76);            // chainring, rear part
    ctx.arc(rearCog.x, rearCog.y, rearCogR + 0.12, -0.68, 0.82);   // rear cog, front part
    ctx.stroke();

    // Rear derailleur (black, simple)
    ctx.fillStyle = "#0f1216";
    ctx.beginPath();
    ctx.moveTo(rearLocal.x + 2.0, rearLocal.y + 4.0);
    ctx.lineTo(rearLocal.x + 6.0, rearLocal.y + 7.8);
    ctx.lineTo(rearLocal.x + 1.8, rearLocal.y + 9.2);
    ctx.closePath();
    ctx.fill();

    // Cranks
    const cl = 9, ca = crankAngle;
    const ped1 = { x: bb.x + Math.cos(ca) * cl, y: bb.y + Math.sin(ca) * cl };
    const ped2 = { x: bb.x - Math.cos(ca) * cl, y: bb.y - Math.sin(ca) * cl };
    ctx.strokeStyle = "#cfe0f0"; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(ped1.x, ped1.y); ctx.lineTo(bb.x, bb.y); ctx.lineTo(ped2.x, ped2.y);
    ctx.stroke();
    ctx.fillStyle = "#ff9f43";
    ctx.beginPath(); ctx.arc(ped1.x, ped1.y, 2.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ped2.x, ped2.y, 2.3, 0, Math.PI * 2); ctx.fill();

    // Rider (longer back + longer legs)
    const hip = { x: seatTop.x - 0.8, y: seatTop.y - 4.2 }; // hips higher onto the saddle
    const sho = { x: 15, y: -45 };                       // shoulder further forward and up
    const hand = { x: hood.x + 0.5, y: hood.y + 0.9 };  // hands on the hoods

    // Legs to the pedals: all-black outfit, no stretching (fixed bone lengths)
    const frontLeg = { p: ped1 };
    // The rear leg is projected onto a smaller, further-back pedal path -> doesn't "wrap forward"
    const rearPedVisual = {
      x: bb.x + (ped2.x - bb.x) * 0.78,
      y: bb.y + (ped2.y - bb.y) * 0.78 + 0.8,
    };
    const rearLeg = { p: rearPedVisual };

    // 2-bone IK solution: thigh and shin stay constant length
    function solveKnee(hipP, footP, thighLen, shinLen, bendSign) {
      const dx = footP.x - hipP.x;
      const dy = footP.y - hipP.y;
      const d = Math.hypot(dx, dy) || 0.0001;
      const ux = dx / d;
      const uy = dy / d;
      const nx = -uy;
      const ny = ux;
      const maxReach = thighLen + shinLen - 0.001;
      const clampedD = Math.min(d, maxReach);
      const a = (thighLen * thighLen - shinLen * shinLen + clampedD * clampedD) / (2 * clampedD);
      const hSq = Math.max(0, thighLen * thighLen - a * a);
      const h = Math.sqrt(hSq);
      const px = hipP.x + ux * a;
      const py = hipP.y + uy * a;
      return { x: px + nx * h * bendSign, y: py + ny * h * bendSign };
    }

    const frontKnee = solveKnee(hip, frontLeg.p, 25.5, 22.5, -1);
    const rearKnee = solveKnee(hip, rearLeg.p, 23.0, 20.0, -1);
    const footLen = 6.6;
    const footW = 1.2;
    function drawFoot(p, dirState) {
      // Seamless direction: continuous force vector + soft angle filtering.
      const crankDx = p.x - bb.x;
      const crankDy = p.y - bb.y;
      const crankLen = Math.hypot(crankDx, crankDy) || 1;
      const tanX = (-crankDy / crankLen) * facing;
      const tanY = ( crankDx / crankLen) * facing;

      const baseLen = Math.hypot(facing, 0.08) || 1;
      const baseX = facing / baseLen;
      const baseY = 0.08 / baseLen;
      const targetX = tanX * 0.14 + baseX * 0.86;
      const targetY = tanY * 0.14 + baseY * 0.86;

      const baseA = Math.atan2(baseY, baseX);
      const rawTargetA = Math.atan2(targetY, targetX);
      let relA = rawTargetA - baseA;
      while (relA > Math.PI) relA -= Math.PI * 2;
      while (relA < -Math.PI) relA += Math.PI * 2;
      const maxTilt = 0.34;
      relA = Math.max(-maxTilt, Math.min(maxTilt, relA));
      const targetA = baseA + relA;

      const prevA = Math.atan2(dirState.y, dirState.x);
      let delta = targetA - prevA;
      while (delta > Math.PI) delta -= Math.PI * 2;
      while (delta < -Math.PI) delta += Math.PI * 2;
      const nextA = prevA + delta * 0.12;

      let tx = Math.cos(nextA);
      let ty = Math.sin(nextA);
      dirState.x = tx;
      dirState.y = ty;

      const fx0 = p.x - tx * footW;
      const fy0 = p.y - ty * footW;
      const fx1 = p.x + tx * (footLen - footW);
      const fy1 = p.y + ty * (footLen - footW);
      ctx.beginPath();
      ctx.moveTo(fx0, fy0);
      ctx.lineTo(fx1, fy1);
      ctx.stroke();
    }

    // Rear leg (visible, but behind the frame)
    ctx.strokeStyle = "#0f1216";
    ctx.lineWidth = 3.8;
    ctx.beginPath();
    ctx.moveTo(hip.x, hip.y); ctx.lineTo(rearKnee.x, rearKnee.y); ctx.lineTo(rearLeg.p.x, rearLeg.p.y);
    ctx.stroke();
    ctx.lineWidth = 3.0;
    ctx.strokeStyle = "#0b0d10";
    drawFoot(rearLeg.p, rearFootDir);

    // Draw the frame over the leg -> the leg stays visually behind
    ctx.strokeStyle = "#d8161d";
    ctx.lineWidth = 4.6;
    ctx.beginPath();
    ctx.moveTo(seatTop.x, seatTop.y); ctx.lineTo(headTop.x, headTop.y);
    ctx.moveTo(seatTop.x, seatTop.y); ctx.lineTo(bb.x, bb.y);
    ctx.moveTo(bb.x, bb.y); ctx.lineTo(headTop.x, headTop.y);
    ctx.stroke();
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(bb.x, bb.y); ctx.lineTo(rearLocal.x, rearLocal.y);
    ctx.moveTo(seatTop.x, seatTop.y); ctx.lineTo(rearLocal.x, rearLocal.y);
    ctx.stroke();

    // Front leg on top
    ctx.strokeStyle = "#0f1216";
    ctx.lineWidth = 4.5;
    ctx.beginPath();
    ctx.moveTo(hip.x, hip.y); ctx.lineTo(frontKnee.x, frontKnee.y); ctx.lineTo(frontLeg.p.x, frontLeg.p.y);
    ctx.stroke();

    // Front foot on top
    ctx.lineWidth = 3.0;
    ctx.strokeStyle = "#0b0d10";
    drawFoot(frontLeg.p, frontFootDir);

    // Back more curved (black riding outfit)
    ctx.strokeStyle = "#0f1216";
    ctx.lineWidth = 4.5;
    ctx.beginPath();
    ctx.moveTo(hip.x, hip.y);
    ctx.quadraticCurveTo(hip.x + 11, hip.y - 28, sho.x, sho.y);
    ctx.stroke();

    // Arm: the elbow is derived from the normal of the shoulder-hand line
    const armDx = hand.x - sho.x;
    const armDy = hand.y - sho.y;
    const armLen = Math.hypot(armDx, armDy) || 1;
    const armNx = -armDy / armLen;
    const armNy = armDx / armLen;
    const elbow = {
      x: (sho.x + hand.x) / 2 + armNx * 2.8,
      y: (sho.y + hand.y) / 2 + armNy * 2.8,
    };
    ctx.lineWidth = 3.9;
    ctx.beginPath();
    ctx.moveTo(sho.x, sho.y);
    ctx.lineTo(elbow.x, elbow.y);
    ctx.lineTo(hand.x, hand.y);
    ctx.stroke();

    // Elbow joint position
    ctx.beginPath();
    ctx.arc(elbow.x, elbow.y, 1.25, 0, Math.PI * 2);
    ctx.fillStyle = "#0f1216";
    ctx.fill();

    // Neck (clear)
    const neckBase = { x: sho.x + 0.6, y: sho.y + 0.2 };
    const neckTop = { x: sho.x + 2.5, y: sho.y - 5.1 };
    ctx.strokeStyle = "#ffd166";
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(neckBase.x, neckBase.y);
    ctx.lineTo(neckTop.x, neckTop.y);
    ctx.stroke();

    // Head (clear)
    const head = { x: sho.x + 6.0, y: sho.y - 10.4 };
    ctx.beginPath();
    ctx.arc(head.x, head.y, 6.8, 0, Math.PI * 2);
    ctx.fillStyle = "#ffd166";
    ctx.fill();
    ctx.strokeStyle = "#0a0e14";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Ear + eye
    ctx.beginPath();
    ctx.arc(head.x - 2.4, head.y - 0.7, 0.9, 0, Math.PI * 2);
    ctx.fillStyle = "#f3b366";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(head.x + 2.6, head.y - 1.4, 0.55, 0, Math.PI * 2);
    ctx.fillStyle = "#1a1a1a";
    ctx.fill();

    // Helmet: upper half without a seam artifact
    ctx.save();
    ctx.beginPath();
    ctx.rect(head.x - 8.5, head.y - 9.0, 17.0, 9.1); // only the top half of the head
    ctx.clip();
    ctx.fillStyle = "#f8fbff";
    ctx.strokeStyle = "#8792a0";
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(head.x, head.y, 7.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Helmet bottom edge + front edge
    ctx.strokeStyle = "#7f8a97";
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(head.x - 7.0, head.y - 0.2);
    ctx.lineTo(head.x + 6.6, head.y - 0.2);
    ctx.stroke();
    ctx.strokeStyle = "#283241";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(head.x + 3.1, head.y - 2.5);
    ctx.lineTo(head.x + 7.1, head.y - 1.2);
    ctx.stroke();

    // Drivetrain in front: chainring + cassette + lower chain
    // (drawn last so it stays over the legs/tubes)
    const lowerChainFront = { x: bb.x - chainringR * 0.92, y: bb.y + chainringR * 0.52 };
    const lowerChainRear = { x: rearCog.x + rearCogR * 0.92, y: rearCog.y + rearCogR * 0.72 };

    ctx.strokeStyle = "#2e343c";
    ctx.lineWidth = 1.7;
    ctx.beginPath();
    ctx.moveTo(lowerChainFront.x, lowerChainFront.y);
    ctx.lineTo(lowerChainRear.x, lowerChainRear.y);
    ctx.stroke();

    ctx.strokeStyle = "#3a404a";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, chainringR + 0.18, 2.75, 3.95);            // lower sector of the chainring
    ctx.arc(rearCog.x, rearCog.y, rearCogR + 0.14, 0.02, 1.05);    // lower sector of the rear cog
    ctx.stroke();

    // Chainring on top
    ctx.strokeStyle = "#0f1216";
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, chainringR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, chainringR - 2.2, 0, Math.PI * 2);
    ctx.strokeStyle = "#6d7682";
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Cassette on top
    ctx.fillStyle = "#101418";
    ctx.beginPath();
    ctx.arc(rearCog.x, rearCog.y, rearCogR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#7a838f";
    ctx.lineWidth = 1.0;
    ctx.stroke();

    // Front leg topmost (also over the chainring)
    ctx.strokeStyle = "#0f1216";
    ctx.lineWidth = 4.5;
    ctx.beginPath();
    ctx.moveTo(hip.x, hip.y); ctx.lineTo(frontKnee.x, frontKnee.y); ctx.lineTo(frontLeg.p.x, frontLeg.p.y);
    ctx.stroke();
    ctx.lineWidth = 3.0;
    ctx.strokeStyle = "#0b0d10";
    drawFoot(frontLeg.p, frontFootDir);

    ctx.restore();
  }

  // --- HUD --------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const overlay = $("overlay");
  function fmtTime(ms) {                          // Across style mm:ss:cc
    if (!(ms > 0)) ms = 0;
    const p = (n) => String(n).padStart(2, "0");
    return p(Math.floor(ms / 60000)) + ":" + p(Math.floor(ms / 1000) % 60) + ":" + p(Math.floor(ms / 10) % 100);
  }
  function updateHUD() {
    const now = state === "play" ? performance.now() : endT;
    const t = currentRunMs(now);
    $("clkTime").textContent = fmtTime(t);
    $("clkBest").textContent = best === null ? "--:--:--" : fmtTime(best * 1000);
    const distKm = Math.max(0, tripMeters) / 1000;
    const speedNow = Math.round(Math.max(0, wheelSpeedKph));
    const cadNow = Math.round(Math.max(0, cadenceRpm));
    const progress = Math.max(0, Math.min(1, tripMeters / Math.max(1, LEVEL_LENGTH_M)));

    $("speed").textContent = speedNow;
    $("speedBar").style.width = Math.max(0, Math.min(100, (wheelSpeedKph / 100) * 100)).toFixed(1) + "%";
    $("dist").textContent = distKm.toFixed(2) + " km";
    $("distMeta").textContent = "/ " + (LEVEL_LENGTH_M / 1000).toFixed(2) + " km";
    drawMiniProfile();

    $("pedal").textContent = cadNow + " rpm";
    $("cadBar").style.width = Math.max(0, Math.min(100, (cadenceRpm / Math.max(1, CFG.cadenceMaxRpm)) * 100)).toFixed(1) + "%";

    $("zone").textContent = zoneAt(chassis.position.x).name;

    for (let i = 1; i <= 3; i++) {
      const icon = $("radler" + i);
      if (!icon) continue;
      if (i <= collectedCount) icon.classList.add("got");
      else icon.classList.remove("got");
    }

    const m = $("muteToggle");
    if (m) m.textContent = "SOUND (M)";
  }
  function showOverlay() {
    const big = $("overlayBig"), sub = $("overlaySub");
    if (state === "crash") {
      big.textContent = "CRASH!"; big.className = "big crash";
      sub.innerHTML = 'Press <kbd>R</kbd> to try again';
    } else {
      big.textContent = "FINISH!"; big.className = "big win";
      sub.innerHTML = `Time ${fmtTime(currentRunMs(endT))}${newRecord ? " · <b>NEW RECORD!</b>" : ""} · press <kbd>R</kbd> to restart`;
    }
    overlay.classList.add("show");
  }

  // --- Main loop ------------------------------------------------------
  let last = performance.now();
  function loop(now) {
      appendGroundUntil(chassis.position.x + (W / Math.max(0.5, cam.zoom)) + TRACK_PAD_AHEAD);
    spawnCollectiblesAhead(chassis.position.x + 2800);

    let dt = now - last; last = now;
    dt = Math.min(dt, 32);                       // stabilize big jumps

    if (introVisible) {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);
      requestAnimationFrame(loop);
      return;
    }

    // Gearbox: crank speed -> wheel speed with a BIG ratio.
    // Direct relation to the road: wheel speed = crank speed × gear (freewheel).
    const inst = crankAccum; crankAccum = 0;
    const frameSec = Math.max(dt, 1) / 1000;
    const preWheelKph = Math.abs(rear.angularVelocity) * CFG.wheelR * 0.06 * 3.6;
    const terrainAngNow = Math.atan2(
      groundYAt(front.position.x) - groundYAt(rear.position.x),
      Math.max(1, front.position.x - rear.position.x)
    );
    const flatish = Math.abs(terrainAngNow) < 0.22;  // ramp (steep) -> no anti-hop, allowed to launch
    const slopeAlongTravel = Math.sin(terrainAngNow) * (facing >= 0 ? 1 : -1);
    const downhill = Math.max(0, -slopeAlongTravel);
    const uphill = Math.max(0, slopeAlongTravel);
    // Steep climb -> harder to pedal (arcade feel).
    const climbTarget = 1 - Math.min(0.72, uphill * CFG.climbHardness);
    climbResist += (climbTarget - climbResist) * 0.2;
    const effectiveKph = preWheelKph + downhill * CFG.bounceDownhillBonusKph - uphill * CFG.bounceUphillPenaltyKph;
    const bounceTLinear = (effectiveKph - CFG.bounceNoHopKph) / Math.max(1, CFG.bounceFullKph - CFG.bounceNoHopKph);
    const bounceT = clamp01(bounceTLinear);
    const bounceEase = bounceT * bounceT * (3 - 2 * bounceT);
    const maxCrankVelFrame = (CFG.cadenceMaxRpm / 60) * Math.PI * 2 * frameSec;
    crankVel += (inst - crankVel) * 0.35;        // smoothed crank speed
    crankVel = Math.max(-maxCrankVelFrame, Math.min(maxCrankVelFrame, crankVel));
    if (crankVel < 0.0005) crankVel = 0;
    const gear = gearRatioNow();
    if (state === "play" && crankVel > 0 && rearWheelGrounded()) {
      let wt = facing * crankVel * gear * climbResist;
      wt = facing > 0 ? Math.min(wt, CFG.pedalMax) : Math.max(wt, -CFG.pedalMax);
      if (facing > 0) Body.setAngularVelocity(rear, Math.max(rear.angularVelocity, wt));
      else            Body.setAngularVelocity(rear, Math.min(rear.angularVelocity, wt));
    }
    const crankDelta = Math.abs(crankVel);
    const coastVel = Math.min(
      CFG.coastCadenceMax,
      maxCrankVelFrame,
      Math.abs(rear.angularVelocity) / gear * CFG.coastCadenceMul
    );
    const targetLegVel = Math.max(crankDelta, coastVel);
    const legResponse = targetLegVel > legCrankVel ? 0.10 : 0.028;
    legCrankVel += (targetLegVel - legCrankVel) * legResponse;
    if (targetLegVel < 0.002) legCrankVel *= 0.993;
    if (legCrankVel < 0.0005) legCrankVel = 0;

    const instantRpm = Math.min(
      CFG.cadenceMaxRpm,
      (legCrankVel / (Math.PI * 2)) * (1000 / Math.max(dt, 1)) * 60
    );
    const cadenceResponse = instantRpm > cadenceRpm ? 0.22 : 0.05;
    cadenceRpm += (instantRpm - cadenceRpm) * cadenceResponse;
    cadenceRpm = Math.min(CFG.cadenceMaxRpm, cadenceRpm);
    if (cadenceRpm < 0.4) cadenceRpm = 0;
    cadence = Math.min(1, legCrankVel / CFG.cadenceFull);
    const spinSign = Math.sign(rear.angularVelocity) || facing;
    crankAngle += legCrankVel * spinSign;        // cranks also turn slightly while coasting
    pedalPulse *= 0.85;
    const sinceScroll = lastScrollMs > 0 ? now - lastScrollMs : 999;
    rollBurst *= (sinceScroll > CFG.scrollFastMs * 1.35) ? 0.90 : CFG.burstDecay;
    if (rollBurst < 0.001) rollBurst = 0;

    // Drive momentum: bike-like start and momentum carry.
    if (state === "play" && driveMomentum > 0.0001) {
      const rearOnGround = (rear.position.y - groundYAt(rear.position.x)) > -7;
      const frontOnGround = (front.position.y - groundYAt(front.position.x)) > -7;
      const onGround = rearOnGround || frontOnGround;
      const dir = facing >= 0 ? 1 : -1;
      const startMul = preWheelKph < CFG.startAssistKph ? CFG.startAssistMul : 1;
      const burstDriveMul = 0.55 + rollBurst * 0.45;
      const push = Math.min(driveMomentum * startMul * burstDriveMul, CFG.driveStepMax);

      if (rearOnGround) {
        const rearTarget = rear.angularVelocity + dir * push;
        const rearClamped = dir > 0
          ? Math.min(rearTarget, CFG.pedalMax)
          : Math.max(rearTarget, -CFG.pedalMax);
        Body.setAngularVelocity(rear, rearClamped);
      }

      if (CFG.frontDriveShare > 0) {
        const frontTarget = front.angularVelocity + dir * push * CFG.frontDriveShare;
        const frontCap = CFG.pedalMax * 0.90;
        const frontClamped = dir > 0
          ? Math.min(frontTarget, frontCap)
          : Math.max(frontTarget, -frontCap);
        Body.setAngularVelocity(front, frontClamped);
      }

      if (onGround) {
        const terrainAng = Math.atan2(
          groundYAt(front.position.x) - groundYAt(rear.position.x),
          Math.max(1, front.position.x - rear.position.x)
        );
        let err = terrainAng - chassis.angle;
        while (err > Math.PI) err -= Math.PI * 2;
        while (err < -Math.PI) err += Math.PI * 2;
        const corr = err * CFG.slopeAssist;
        // Don't auto-level/damp rotation while the player is actively leaning
        // -> so pedaling during a wheelie can speed up the rotation.
        const leaningNow = !!(keys["a"] || keys["d"] || keys["arrowleft"] || keys["arrowright"]);
        if (!leaningNow) {
          Body.setAngularVelocity(chassis, (chassis.angularVelocity + corr) * CFG.antiFlipDamp);
        }
        const press = CFG.tractionPress * Math.min(1, driveMomentum / Math.max(0.001, CFG.scrollKickMax));
        Body.applyForce(chassis, chassis.position, { x: 0, y: press });

        // Speed-dependent anti-hop: tight below 30 km/h, more permissive at 100+ km/h.
        const hopClamp = lerp(CFG.hopClampLow, CFG.hopClampHigh, bounceEase);
        const hopVelThreshold = -lerp(0.24, 0.42, bounceEase);
        if (rearOnGround && push > 0.001 && flatish && chassis.velocity.y < hopVelThreshold) {
          Body.setVelocity(chassis, { x: chassis.velocity.x, y: chassis.velocity.y * hopClamp });
        }
      }

      if (rearOnGround) {
        const retentionT = Math.max(0, Math.min(1, Math.max(preWheelKph / 65, driveMomentum / CFG.scrollKickMax)));
        const decay = CFG.momentumDecayLow + (CFG.momentumDecayHigh - CFG.momentumDecayLow) * retentionT;
        driveMomentum *= decay;
      } else {
        driveMomentum *= CFG.momentumAirDecay;
      }
      if (driveMomentum < 0.0001) driveMomentum = 0;
    }

    applyControls();
    Engine.update(engine, dt);

    if (state === "play") {
      const rearGroundNow = (rear.position.y - groundYAt(rear.position.x)) > -7;
      const frontGroundNow = (front.position.y - groundYAt(front.position.x)) > -7;
      if ((rearGroundNow || frontGroundNow) && flatish) {
        const landChassisMul = lerp(CFG.landChassisLow, CFG.landChassisHigh, bounceEase);
        const landWheelMul = lerp(CFG.landWheelLow, CFG.landWheelHigh, bounceEase);
        const chassisLandThreshold = -lerp(0.08, 0.30, bounceEase);
        const wheelLandThreshold = -lerp(0.06, 0.25, bounceEase);
        if (chassis.velocity.y < chassisLandThreshold) {
          Body.setVelocity(chassis, { x: chassis.velocity.x, y: chassis.velocity.y * landChassisMul });
        }
        if (rear.velocity.y < wheelLandThreshold) {
          Body.setVelocity(rear, { x: rear.velocity.x, y: rear.velocity.y * landWheelMul });
        }
        if (front.velocity.y < wheelLandThreshold) {
          Body.setVelocity(front, { x: front.velocity.x, y: front.velocity.y * landWheelMul });
        }
      }
    }

    if (state === "win") {
      // At the finish, a smooth roll-down: the bike gradually stops.
      Body.setAngularVelocity(rear, rear.angularVelocity * 0.972);
      Body.setAngularVelocity(front, front.angularVelocity * 0.972);
      Body.setAngularVelocity(chassis, chassis.angularVelocity * 0.94);
      Body.setVelocity(chassis, { x: chassis.velocity.x * 0.985, y: chassis.velocity.y });
      Body.setVelocity(rear, { x: rear.velocity.x * 0.985, y: rear.velocity.y });
      Body.setVelocity(front, { x: front.velocity.x * 0.985, y: front.velocity.y });
    }

    const dAngRaw = rear.angle - lastRearAngle;
    let dAng = dAngRaw;
    while (dAng > Math.PI) dAng -= Math.PI * 2;
    while (dAng < -Math.PI) dAng += Math.PI * 2;
    lastRearAngle = rear.angle;

    const dMeters = Math.abs(dAng) / (Math.PI * 2) * wheelCircumferenceM();
    const dtSec = Math.max(0.001, dt / 1000);
    const speedKphTarget = (dMeters / dtSec) * 3.6;
    wheelSpeedKph += (speedKphTarget - wheelSpeedKph) * 0.24;
    tripMeters += dMeters;

    updateRollingAudio(dt);
    maybeStartTimer(now);

    if (state === "play") {
      // A genuine player wheelie: leaning back + pedaling while the front wheel is
      // lifted and the rear is still on the ground (distinguishes it from jumps/flying).
      const leaningBack = !!(keys["a"] || keys["arrowleft"]);
      const pedalingNow = cadence > 0.18;
      if (leaningBack && pedalingNow && rearWheelGrounded() && !frontWheelGrounded()) {
        lastRealWheelieMs = now;
      }
      pickupCollectibles();
      // Crash only from the head touching the ground (head bottom reaches the surface).
      const head = rotPoint(chassis, 8, -36);
      if (head.y > groundYAt(head.x) - 6) crash();
      if (chassis.position.y > 4000) crash();      // fell off the world
      // Finish only when practically the whole bike is over the line, so wheelie-ing won't trigger it too early.
      if (rear.position.x >= finishX) win();
    }

    updateCamera();
    drawBackground();
    worldTransform();
    drawTerrain();
    drawDeco();
    drawCollectibles();
    drawFinish();
    drawBike();
    ctx.restore();
    updateHUD();

    if (state === "play") {
      overlay.classList.remove("show");
    }

    requestAnimationFrame(loop);
  }

  // --- Startup -------------------------------------------------------
  buildWorld();
  // Hide the intro if SKIP_INTRO=true
  if (skipIntro) {
    $("intro").classList.add("hide");
    last = performance.now();
  }
  requestAnimationFrame(loop);
  </script>
</body>
</html>
