<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Cyclistomania</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" />
<style>
  :root {
    color-scheme: light;
    --font-family-base: "Silkscreen", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --font-family-display: "Silkscreen", ui-monospace, monospace;

    /* Typography scale */
    --fs-2xs: 14px;
    --fs-xs: 15px;
    --fs-sm: 17px;
    --fs-md: 19px;
    --fs-lg: 24px;
    --fs-xl: 40px;
    --fs-hero-min: 34px;
    --fs-hero-fluid: 7vw;
    --fs-hero-max: 72px;

    --fw-regular: 400;
    --fw-bold: 700;

    --lh-tight: 1;
    --lh-normal: 1.4;
    --lh-relaxed: 1.65;
    --lh-loose: 1.75;

    --ls-tight: 0px;
    --ls-normal: .2px;
    --ls-wide: .45px;
    --ls-xwide: .9px;
    --sky-top: #7ec0f6;
    --sky-mid: #abd9ff;
    --sky-bot: #dff1ff;
    --hud-fg: #163a57;
    --hud-accent: #0f5f8a;
    --hud-bg: rgba(242, 250, 255, .84);
    --hud-border: rgba(22, 64, 98, .36);
    --panel-shadow: rgba(16, 45, 69, .16);
    --terrain-city: #596f82;
    --terrain-road: #4f6171;
    --terrain-gravel: #9b8f73;
    --terrain-forest: #6f6548;
    --terrain-hill: #7e7567;
    --ui-ink-1: #f6fbff;
    --ui-ink-2: #d8ecfa;
    --ui-track: rgba(255, 255, 255, .18);
    --ui-track-border: rgba(255, 255, 255, .34);
    --ui-fill-a: #2f9ad1;
    --ui-fill-b: #62d0c5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1b2a; }
  body { font-family: var(--font-family-base); }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; cursor: crosshair; }

  /* HUD */
  .hud {
    position: fixed;
    pointer-events: none;
    color: var(--hud-fg);
    text-shadow: 0 1px 0 rgba(255,255,255,.42);
    user-select: none;
    font-family: var(--font-family-base);
    font-weight: var(--fw-regular);
    line-height: var(--lh-normal);
    letter-spacing: var(--ls-tight);
  }
  .clockbox {
    padding: 0;
    border: none;
    border-radius: 8px;
    background: transparent;
    box-shadow: none;
  }
  #bottomHud {
    left: 0;
    right: 0;
    bottom: 0;
    padding: 22px 26px 22px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 22px;
    align-items: stretch;
    background: transparent;
    border-top: none;
    box-shadow: none;
    color: var(--ui-ink-1);
    text-shadow: 0 1px 2px rgba(8, 22, 34, .68);
  }
  .hud-left {
    display: grid;
    grid-template-columns: 1.2fr 1fr auto;
    gap: 22px;
    align-items: stretch;
  }
  .hud-right {
    display: grid;
    grid-template-columns: auto auto;
    gap: 22px;
    align-items: stretch;
  }
  .hud-panel {
    background: transparent;
    border: none;
    box-shadow: none;
    border-radius: 0;
    padding: 8px 14px;
    min-height: 82px;
    display: grid;
    align-content: start;
  }
  .hud-panel-metric { grid-template-rows: 16px 18px 40px; }
  .hud-panel-section,
  .hud-panel-radlers { grid-template-rows: 16px 44px; }
  .hud-label {
    font-size: 12px;
    letter-spacing: .8px;
    color: var(--ui-ink-2);
    opacity: .9;
    margin-bottom: 0;
    line-height: 16px;
    align-self: start;
  }
  .route-track, .cad-track, .speed-track {
    width: 100%;
    height: 18px;
    border-radius: 0;
    background: var(--ui-track);
    overflow: hidden;
    border: 1px solid var(--ui-track-border);
  }
  .route-profile {
    width: 100%;
    height: 18px;
    border-radius: 0;
    background: var(--ui-track);
    border: 1px solid var(--ui-track-border);
    display: block;
  }
  .route-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--ui-fill-a), var(--ui-fill-b));
    transition: width .1s linear;
  }
  .cad-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--ui-fill-a), var(--ui-fill-b));
    transition: width .1s linear;
  }
  .speed-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--ui-fill-a), var(--ui-fill-b));
    transition: width .08s linear;
  }
  .route-text {
    margin-top: 6px;
    font-size: 19px;
    color: var(--ui-ink-1);
    letter-spacing: .2px;
    min-height: 32px;
    display: flex;
    align-items: flex-end;
    font-variant-numeric: tabular-nums;
  }
  .route-text b { color: var(--ui-ink-1); }
  #dist { display: inline-block; min-width: 7ch; text-align: right; }
  .cad-text {
    margin-top: 6px;
    font-size: 19px;
    color: var(--ui-ink-1);
    min-height: 32px;
    display: flex;
    align-items: flex-end;
    font-variant-numeric: tabular-nums;
  }
  .section-name {
    font-size: 28px;
    line-height: 1;
    letter-spacing: .8px;
    color: var(--ui-ink-1);
    text-shadow: 0 1px 0 rgba(255,255,255,.45);
    white-space: nowrap;
    min-height: 44px;
    display: flex;
    align-items: flex-end;
  }
  .speed-card {
    min-width: 198px;
  }
  .speed-value {
    margin-top: 6px;
    display: flex;
    align-items: baseline;
    gap: 7px;
    min-height: 34px;
    font-variant-numeric: tabular-nums;
  }
  .speed-value b {
    font-size: 34px;
    line-height: 1;
    color: var(--ui-ink-1);
    min-width: 3ch;
    text-align: right;
  }
  .speed-value span {
    font-size: 16px;
    color: var(--ui-ink-2);
  }
  .radler-row {
    display: flex;
    gap: 6px;
    align-items: flex-end;
    min-height: 44px;
  }
  .radler-icon {
    width: 34px;
    height: 42px;
    object-fit: contain;
    filter: grayscale(.95) brightness(.72);
    opacity: .34;
    transform: translateY(0);
    transition: opacity .2s ease, filter .2s ease, transform .2s ease;
  }
  .radler-icon.got {
    filter: grayscale(0) brightness(1);
    opacity: 1;
    transform: translateY(-1px);
  }
  #help {
    top: 76px;
    left: 50%; transform: translateX(-50%);
    font-size: var(--fs-sm);
    line-height: var(--lh-relaxed);
    letter-spacing: var(--ls-tight);
    opacity: .96; padding: 0; border-radius: 0;
    border: none;
    background: transparent;
    white-space: nowrap;
    pointer-events: auto;
  }
  #help kbd {
    display: inline-block; min-width: 26px; text-align: center; padding: 7px 13px; margin: 0 3px;
    color: #14324c;
    border: 1px solid #3a5a78;
    border-bottom-width: 2px;
    border-radius: 5px;
    background: #d8ebff;
    font-size: var(--fs-xs);
    font-family: var(--font-family-base);
    line-height: var(--lh-tight);
  }
  .sound-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-left: 6px;
    min-width: 24px;
    padding: 7px 13px;
    color: #14324c;
    border: 1px solid #3a5a78;
    border-bottom-width: 2px;
    border-radius: 5px;
    background: #d8ebff;
    font-size: var(--fs-xs);
    font-family: var(--font-family-base);
    line-height: var(--lh-tight);
    cursor: pointer;
    user-select: none;
    text-shadow: none;
    vertical-align: middle;
  }
  .sound-toggle input {
    width: 12px;
    height: 12px;
    accent-color: #2f78ac;
    cursor: pointer;
    margin: 0;
  }
  #title {
    top: 4px;
    left: 50%; transform: translateX(-50%);
    font-size: var(--fs-lg);
    line-height: var(--lh-tight);
    letter-spacing: var(--ls-wide);
    color: #184664;
    text-shadow: 0 1px 0 rgba(255,255,255,.55);
    font-weight: var(--fw-bold);
    font-family: var(--font-family-display);
  }

  /* Simple title style */
  .retro {
    background: none;
    -webkit-background-clip: initial;
    background-clip: initial;
    -webkit-text-stroke: 0;
    paint-order: normal;
  }

  /* Digital clocks in the corners (Across style, seven-segment) */
  .clockbox.tl { top: 44px; left: 20px; text-align: left; }
  .clockbox.tr { top: 44px; right: 22px; text-align: right; }
  .clockbox .lab {
    font-size: var(--fs-xs);
    letter-spacing: var(--ls-xwide);
    font-weight: var(--fw-bold);
    text-transform: uppercase;
    color: #183d5f;
    opacity: .95;
    margin-bottom: 3px;
  }
  .lcd {
    font-family: var(--font-family-display);
    font-size: var(--fs-xl);
    letter-spacing: var(--ls-wide);
    line-height: var(--lh-tight);
    font-weight: var(--fw-regular);
    color: #28455f; text-shadow: 0 1px 0 rgba(255,255,255,.55);
  }
  .clockbox.tr .lcd { color: #32516d; }

  @media (max-width: 900px) {
    #title { top: 8px; font-size: 20px; }
    .clockbox.tl { top: 36px; left: 12px; }
    .clockbox.tr { top: 36px; right: 12px; }
    .lcd { font-size: 32px; }
    #bottomHud {
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .hud-left {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .hud-right {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .section-name { font-size: 22px; }
    .hud-panel { min-height: 74px; }
    .hud-panel-metric { grid-template-rows: 16px 18px 32px; }
    .hud-panel-section,
    .hud-panel-radlers { grid-template-rows: 16px 36px; }
    .speed-card { min-width: 0; }
    .speed-value b { font-size: 28px; }
    .route-text, .cad-text { font-size: 17px; }
    .radler-icon { width: 30px; height: 38px; }
    #help {
      top: 72px;
      left: 50%; right: auto;
      transform: translateX(-50%);
      font-size: 14px;
      white-space: normal;
      text-align: center;
      max-width: min(96vw, 880px);
    }
  }

  #intro {
    position: fixed; inset: 0; z-index: 20;
    display: grid; place-items: center;
    background: #000;
    pointer-events: auto;
  }
  #intro.hide { display: none; }
  #intro .card {
    text-align: center;
    color: #fff;
    text-shadow: none;
  }
  #intro img {
    width: auto;
    max-width: min(92vw, 950px);
    max-height: 72vh;
    height: auto;
    object-fit: contain;
    border: none;
    box-shadow: none;
    background: transparent;
  }

  #overlay {
    position: fixed; inset: 0; display: none; place-items: center; pointer-events: none;
    background: radial-gradient(circle at 50% 45%, rgba(44,86,121,.0), rgba(30,62,89,.7));
  }
  #overlay.show { display: grid; }
  #overlay .card { text-align: center; color: #fff; }
  #overlay .big {
    font-size: clamp(var(--fs-hero-min), var(--fs-hero-fluid), var(--fs-hero-max));
    font-weight: var(--fw-bold);
    line-height: var(--lh-tight);
    letter-spacing: var(--ls-xwide);
    font-family: var(--font-family-display);
  }
  #overlay .big.crash { color: #ff6b6b; }
  #overlay .big.win  { color: #66e0c8; }
  #overlay .sub {
    margin-top: 10px;
    font-size: var(--fs-md);
    line-height: var(--lh-normal);
    letter-spacing: var(--ls-normal);
    opacity: .9;
    font-family: var(--font-family-base);
  }
  #overlay .sub kbd {
    padding: 1px 7px;
    border: 1px solid #5a7a98;
    border-radius: 5px;
    background: rgba(255,255,255,.08);
    font-size: var(--fs-sm);
    line-height: var(--lh-tight);
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="intro">
    <div class="card">
      <img src="intro.jpeg" alt="Cyclistomania" />
    </div>
  </div>

  <div class="hud clockbox tl">
    <div class="lab">TIME</div>
    <div id="clkTime" class="lcd">00:00:00</div>
  </div>
  <div class="hud clockbox tr">
    <div class="lab">BEST</div>
    <div id="clkBest" class="lcd">--:--:--</div>
  </div>
  <div id="bottomHud" class="hud">
    <div class="hud-left">
      <div class="hud-panel hud-panel-metric">
        <div class="hud-label">ROUTE PROGRESS</div>
        <canvas id="routeProfile" class="route-profile"></canvas>
        <div class="route-text"><b id="dist">0.00</b> <span id="distMeta">/ 0.05 km</span></div>
      </div>
      <div class="hud-panel hud-panel-metric">
        <div class="hud-label">CADENCE</div>
        <div class="cad-track"><div id="cadBar" class="cad-fill"></div></div>
        <div class="cad-text" id="pedal">0 rpm</div>
      </div>
      <div class="hud-panel hud-panel-section">
        <div class="hud-label">SECTION</div>
        <div id="zone" class="section-name">—</div>
      </div>
    </div>

    <div class="hud-right">
      <div class="hud-panel hud-panel-metric speed-card">
        <div class="hud-label">SPEEDOMETER</div>
        <div class="speed-track"><div id="speedBar" class="speed-fill"></div></div>
        <div class="speed-value"><b id="speed">0</b><span>km/h</span></div>
      </div>
      <div class="hud-panel hud-panel-radlers">
        <div class="hud-label">RADLERS</div>
        <div class="radler-row">
          <img id="radler1" class="radler-icon" src="radler.png" alt="radler" />
          <img id="radler2" class="radler-icon" src="radler.png" alt="radler" />
          <img id="radler3" class="radler-icon" src="radler.png" alt="radler" />
        </div>
      </div>
    </div>
  </div>
  <div id="help" class="hud">
    🖱️ <b>Scroll = pedal</b> &nbsp; <kbd>↓</kbd> brake &nbsp;
    <kbd>←</kbd><kbd>→</kbd> lean &nbsp;
    <kbd>R</kbd> restart
    <label class="sound-toggle" for="soundToggle">
      <input id="soundToggle" type="checkbox" checked />
      <span id="muteToggle">SOUND (M)</span>
    </label>
  </div>

  <div id="overlay" class="hud">
    <div class="card">
      <div id="overlayBig" class="big"></div>
      <div id="overlaySub" class="sub"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module">
  "use strict";

  /* ----------------------------------------------------------------------
     Cyclistomania — a single-file Across / Elasto Mania-style
     physics game. Matter.js handles the physics; rendering is done by hand on canvas
     for the camera, zoom, and a minimalist style.
     ---------------------------------------------------------------------- */

  const { Engine, Bodies, Body, Composite, Constraint, Events } = Matter;

  // --- Tune the game here -------------------------------------------------
  const CFG = {
    seg:        14,     // terrain segment width (px) — smaller = smoother road
    wheelR:     23,     // wheel radius (a bit larger)
    wheelInches: 28,    // real wheel size for calculations
    wheelbase:  78,     // wheelbase
    crankStep:  1.0,    // crank rotation per scroll notch (rad)
    chainringTeeth: 55, // typical pro-road large chainring
    rearCogTeeth: 11,   // typical smallest cog for stage riding
    cadenceFull:0.6,    // crank speed at which the cadence meter is full
    cadenceMaxRpm: 150, // slightly lower cap, stays more controllable
    coastCadenceMul: 0.48, // share of wheel speed transferred to the legs while coasting
    coastCadenceMax: 0.15, // max coasting crank speed (rad/frame)
    pedalMax:   2.35,   // wheel top angular velocity (mechanical cap)
    strollKick: 0.055,  // small scroll -> slow bike-like start
    strollMax:  0.85,   // stroll speed cap
    scrollKick: 0.11,   // each scroll impulse builds drive momentum
    scrollKickMax: 2.00, // drive momentum cap
    inputStepMax: 0.22, // max momentum gain from a single scroll event
    scrollFastMs: 90, // events faster than this count as fast-paced
    groundInputScale: 1.0, // input power when the rear wheel has grip
    airInputScale: 0.28, // input power in the air (no catapult)
    startAssistKph: 10,  // start-off range
    startAssistMul: 1.18, // extra push from low speed
    momentumDecayLow: 0.968, // light input decays more slowly
    momentumDecayHigh: 0.995, // hard input carries longer
    momentumAirDecay: 0.972, // momentum fades a bit faster in the air
    frontDriveShare: 0.00, // no front drive: more stable bike behavior
    driveStepMax: 0.040, // max drive per frame (prevents stutter)
    burstRise: 0.62, // consecutive fast scrolls increase drive
    burstDecay: 0.95, // burst fades if scroll rate drops
    burstBoostMax: 1.45, // many fast scrolls -> clear extra drive
    antiFlipDamp: 0.68, // chassis angular damping while pedaling
    slopeAssist: 0.026, // gently rotate the chassis toward the slope
    tractionPress: 0.00038, // light downward force that adds traction
    bounceNoHopKph: 58, // below this the bike must not hop (50-60 stays grounded)
    bounceFullKph: 135, // around this hopping is clearly allowed
    bounceDownhillBonusKph: 16, // more hopping allowed when riding downhill
    bounceUphillPenaltyKph: 20, // uphill hopping is restrained earlier
    hopClampLow: 0.55, // low-speed anti-hop damping (tight)
    hopClampHigh: 0.86, // high-speed anti-hop damping (lighter)
    landChassisLow: 0.62, // chassis landing damping at low speeds
    landChassisHigh: 0.90, // chassis landing damping at high speeds
    landWheelLow: 0.65, // wheel landing damping at low speeds
    landWheelHigh: 0.92, // wheel landing damping at high speeds
    airDrag:    0.0028, // lower air drag -> speed carries clearly longer
    brake:      0.84,   // brake damping / frame
    lean:       0.0115, // base lean force (snappier response)
    leanMaxMul: 3.8,    // a long press increases the effect up to this
    leanRampMs: 520,    // milliseconds to full lean force
    arrowLeanBoost: 1.35, // Across-style extra reaction for arrow keys
    wheeliePedalBoost: 2.4, // while wheelie-ing, harder pedaling speeds up the rotation
    climbHardness: 1.3,     // steep climb -> harder to pedal (0 = no effect)
    suspStiff:  1.00,   // stiff constraints (no stretch)
    suspDamp:   0.46,   // suspension damping absorbs bumps -> less micro-bounce at speed
    gravity:    1.0,
  };
  const gearRatioNow = () => CFG.chainringTeeth / Math.max(1, CFG.rearCogTeeth);
  const wheelCircumferenceM = () => Math.PI * CFG.wheelInches * 0.0254;
  const wheelCircumferencePx = () => Math.PI * 2 * CFG.wheelR;
  const pxPerMeter = () => wheelCircumferencePx() / Math.max(0.0001, wheelCircumferenceM());
  const FREEWHEEL = {
    hubTeeth: 36,      // typical ratchet ring
    audibleDiv: 2,     // not every click is heard separately
    minHz: 4,
    maxHz: 34,
  };

  // --- Track zones: long stage-style stretches over an 80 km route ---------
  // hill = gentle macro hills, low = mid-frequency shapes,
  // rough = surface roughness, rf = roughness frequency,
  // rollAmp/rollFreq = the zone's own undulation,
  // jumpAmp/jumpSpacing = the zone's jump line.
  const M = pxPerMeter();
  const ZONES = [
    // Total: 80 km. Climbs/descents are now genuinely kilometers long.
    { name: "Road Start",     type: "road",   len:  6000 * M, hill: 18, low: 7, rough: 0.9, rf: 0.018, rollAmp: 4,  rollFreq: 0.00016, jumpAmp: 48,  jumpSpacing: 22 * M },
    { name: "Alpine Climb",   type: "hill",   len: 14000 * M, hill: 34, low: 9, rough: 1.0, rf: 0.018, rollAmp: 8,  rollFreq: 0.00009, jumpAmp: 52,  jumpSpacing: 26 * M },
    { name: "Fast Descent",   type: "road",   len: 10000 * M, hill: 16, low: 7, rough: 0.8, rf: 0.017, rollAmp: 8,  rollFreq: 0.00011, jumpAmp: 64,  jumpSpacing: 16 * M },
    { name: "Rolling Hills",  type: "forest", len:  9000 * M, hill: 24, low: 9, rough: 1.2, rf: 0.022, rollAmp: 9,  rollFreq: 0.00020, jumpAmp: 60,  jumpSpacing: 15 * M },
    { name: "Jump Line",      type: "gravel", len:  5000 * M, hill: 22, low: 9, rough: 1.4, rf: 0.026, rollAmp: 9,  rollFreq: 0.00024, jumpAmp: 122, jumpSpacing: 11 * M },
    { name: "Highland Climb", type: "hill",   len: 12000 * M, hill: 36, low: 9, rough: 1.1, rf: 0.020, rollAmp: 8,  rollFreq: 0.00010, jumpAmp: 54,  jumpSpacing: 24 * M },
    { name: "Long Descent",   type: "road",   len: 16000 * M, hill: 15, low: 6, rough: 0.8, rf: 0.017, rollAmp: 6,  rollFreq: 0.00009, jumpAmp: 66,  jumpSpacing: 15 * M },
    { name: "Final Rollers",  type: "city",   len:  8000 * M, hill: 20, low: 8, rough: 1.0, rf: 0.020, rollAmp: 8,  rollFreq: 0.00022, jumpAmp: 60,  jumpSpacing: 16 * M },
  ];
  const ZONE_LOOP_LEN = ZONES.reduce((s, z) => s + z.len, 0);
  const INITIAL_TRACK_START_X = -3200;
  const INITIAL_TRACK_END_X = 9200;
  const TRACK_PAD_AHEAD = 2200;

  const lerp = (a, b, t) => a + (b - a) * t;
  const clamp01 = (v) => Math.max(0, Math.min(1, v));
  function zoneAt(x) {                       // {p: params (blended), name}
    const loopX = ((x % ZONE_LOOP_LEN) + ZONE_LOOP_LEN) % ZONE_LOOP_LEN;
    let acc = 0, i = 0;
    for (; i < ZONES.length - 1; i++) { if (loopX < acc + ZONES[i].len) break; acc += ZONES[i].len; }
    const z = ZONES[i], localX = loopX - acc, next = ZONES[(i + 1) % ZONES.length];
    const p = { hill: z.hill, low: z.low, rough: z.rough, rf: z.rf };
    const trans = 260 * M;                   // about 260 m smooth transition between zones
    if (z.len - localX < trans) {
      const t = 1 - (z.len - localX) / trans, s = t * t * (3 - 2 * t);
      p.hill = lerp(z.hill, next.hill, s); p.low = lerp(z.low, next.low, s);
      p.rough = lerp(z.rough, next.rough, s); p.rf = lerp(z.rf, next.rf, s);
    }
    return { p, name: z.name, type: z.type, zone: z, localX, loopX };
  }

  // --- Terrain height and value noise -----------------------------------
  function frac(n) { return n - Math.floor(n); }
  function hash(n) { return frac(Math.sin(n) * 43758.5453); }
  function valueNoise(x) {
    const i = Math.floor(x), f = x - i;
    const u = f * f * (3 - 2 * f);                 // smoothstep
    return (hash(i) * (1 - u) + hash(i + 1) * u) * 2 - 1;
  }
  const smooth01 = (t) => {
    const c = Math.max(0, Math.min(1, t));
    return c * c * (3 - 2 * c);
  };
  const band01 = (x, a, b, e = 260) => smooth01((x - a) / e) * (1 - smooth01((x - b) / e));
  const pulse01 = (x, start, rise, flat, fall) => {
    const up = smooth01((x - start) / rise);
    const down = smooth01((x - (start + rise + flat)) / fall);
    return up - down;
  };
  const BASE_Y = 400;                              // base level (larger y = lower)
  function terrainHeight(x, opts) {
    const o = opts || {};
    const includeMicro = o.micro !== false;
    const includeNano = o.nano !== false;
    const includeJumps = o.jumps !== false;
    const profileSimple = o.profileSimple === true;
    const { p, zone, localX } = zoneAt(x);
    let h = BASE_Y;
    const smoothStart = smooth01((x - 700) / 2600); // extra-smooth opening stretch
    const microMul = 0.16 + smoothStart * 0.84;

    if (profileSimple) {
      // A clear, long-line route for the HUD profile without too much wiggle.
      h += valueNoise(x * 0.000045 + 4.2) * 112;
      h += valueNoise(x * 0.000085 + 11.4) * 58;
      const zoneT = (localX / Math.max(1, zone.len)) - 0.5;
      const zoneSlope = zone.type === "hill" ? -52 : zone.type === "road" ? 14 : zone.type === "gravel" ? 22 : zone.type === "forest" ? 10 : 8;
      h += zoneSlope * zoneT;
    } else {
      // Macro profile: long, more natural climbs/descents without an overly regular sine pattern.
      h += valueNoise(x * 0.000065 + 4.2) * 165;
      h += valueNoise(x * 0.000145 + 11.4) * 92;
      h += Math.sin((x - 2800) * 0.00011) * 52;

      // The zone's own long undulation.
      h += Math.sin(localX * zone.rollFreq + 0.6) * zone.rollAmp;

      // Mid-scale variation that makes the terrain lively without jaggedness.
      h += Math.sin(x * 0.00105 + 0.55) * (p.hill * 0.20);
      h += Math.sin(x * 0.0022 + 1.25) * (p.low * 0.24) * microMul;
      h += valueNoise(x * 0.0028 + 2.0) * (p.low * 0.17) * microMul;
    }

    if (includeMicro) {
      // Lower-frequency, smaller micro-roughness so the rigid wheels don't nano-bounce.
      h += valueNoise(x * p.rf * 0.34 + 5.1) * (p.rough * 0.09) * microMul;
    }

    // Rare surprise spots: dip cluster, pothole, kicker, or a bigger jump.
    if (includeNano) {
      h += surpriseTerrainDelta(x, p.rough);
    }

    // Proper jump sections in selected zones.
    if (includeJumps && zone.jumpAmp > 0 && zone.jumpSpacing > 0) {
      const leadIn = Math.min(zone.len * 0.10, 220 * M);
      const leadOut = Math.min(zone.len * 0.10, 200 * M);
      const edgeSoft = Math.min(zone.len * 0.06, 90 * M);
      const jumpBand = band01(localX, leadIn, zone.len - leadOut, edgeSoft);
      const jx = ((localX % zone.jumpSpacing) + zone.jumpSpacing) % zone.jumpSpacing;
      // Kicker: snappy rising ramp (~130 px) -> sharp lip that launches into the air
      const jUp = smooth01(jx / 130);
      const jLip = smooth01((jx - 130) / 56);
      h -= zone.jumpAmp * (jUp - jLip) * jumpBand;
      // softer landing bump a bit after the lip
      h += zone.jumpAmp * 0.22 * pulse01(jx, 320, 100, 80, 220) * jumpBand;
    }

    const flatEnd = 460;                           // force a flat, smooth start
    if (x < flatEnd) {
      const s = smooth01((x - 140) / (flatEnd - 140));
      h = BASE_Y + (h - BASE_Y) * s;
    }
    return h;
  }

  function surpriseTerrainDelta(x, roughness) {
    const xm = x / M;
    const chunkM = 2200; // surprises only every few kilometers
    const chunk = Math.floor(xm / chunkM);
    const pulse = (d, hw) => {
      const ad = Math.abs(d);
      if (ad > hw) return 0;
      const t = ad / Math.max(0.001, hw);
      return (1 + Math.cos(Math.PI * t)) * 0.5;
    };

    let yDelta = 0;
    for (let c = chunk - 1; c <= chunk + 1; c++) {
      const base = c * 157.17 + 12.3;
      const activeRoll = hash(base + 0.17);
      if (activeRoll > 0.36) continue; // rarely active surprise chunk

      const eventCount = activeRoll < 0.09 ? 2 : 1;
      for (let i = 0; i < eventCount; i++) {
        const seed = base + i * 19.31;
        const typeRoll = hash(seed + 1.4);
        const centerM = c * chunkM + 170 + hash(seed + 2.2) * (chunkM - 340);
        const local = xm - centerM;
        const ampMul = 0.82 + roughness * 0.30;

        if (typeRoll < 0.30) {
          // Dip cluster
          const n = 3 + Math.floor(hash(seed + 3.8) * 3); // 3..5
          const spacingM = 0.95 + hash(seed + 4.6) * 1.35;
          const depthM = (0.05 + hash(seed + 5.3) * 0.08) * ampMul;
          const hwM = 0.55 + hash(seed + 6.1) * 0.85;
          for (let j = 0; j < n; j++) {
            const jitter = (hash(seed + 8.0 + j) - 0.5) * 0.4;
            const offset = (j - (n - 1) * 0.5) * spacingM + jitter;
            yDelta += depthM * M * pulse(local - offset, hwM);
          }
        } else if (typeRoll < 0.58) {
          // Single pothole
          const depthM = (0.08 + hash(seed + 7.0) * 0.12) * ampMul;
          const hwM = 1.0 + hash(seed + 7.8) * 1.4;
          yDelta += depthM * M * pulse(local, hwM);
        } else if (typeRoll < 0.84) {
          // Kicker: small dip + fairly sharp rise
          const dipM = (0.05 + hash(seed + 8.7) * 0.08) * ampMul;
          const kickM = (0.07 + hash(seed + 9.4) * 0.10) * ampMul;
          yDelta += dipM * M * pulse(local + 0.9, 1.1);
          yDelta -= kickM * M * pulse(local - 0.25, 0.75);
        } else {
          // Bigger jump: takeoff, small "gap" and landing area
          const takeoffM = (0.13 + hash(seed + 10.2) * 0.16) * ampMul;
          const gapM = (0.09 + hash(seed + 11.1) * 0.12) * ampMul;
          const landM = (0.07 + hash(seed + 11.9) * 0.12) * ampMul;
          yDelta += gapM * M * pulse(local + 0.9, 1.25);
          yDelta -= takeoffM * M * pulse(local - 0.15, 0.95);
          yDelta -= landM * M * pulse(local - 2.2, 1.4);
        }
      }
    }
    return yDelta;
  }

  function playRadlerPickup() {
    if (muted) return;
    ensureAudio();

    // Primarily a WebAudio buffer: works reliably for repeated hits.
    if (actx && pickupBuf) {
      try {
        const src = actx.createBufferSource();
        src.buffer = pickupBuf;
        const g = actx.createGain();
        g.gain.value = 0.9;
        src.connect(g);
        g.connect(actx.destination);
        src.start();
        return;
      } catch (_) {}
    }

    // Secondarily an HTMLAudio element.
    try {
      pickupSfx.currentTime = 0;
      pickupSfx.volume = 0.9;
      const p = pickupSfx.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
      return;
    } catch (_) {}

    // Last fallback: a short beep so the hit is definitely audible.
    if (actx) {
      const t = actx.currentTime;
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(820, t);
      o.frequency.exponentialRampToValueAtTime(560, t + 0.06);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.12, t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
      o.connect(g);
      g.connect(actx.destination);
      o.start(t);
      o.stop(t + 0.085);
    }
  }

      g.gain.value = vol;

    fetch(url)
      .then((r) => { if (!r.ok) throw new Error("fetch failed"); return r.arrayBuffer(); })
      .then((ab) => actx.decodeAudioData(ab.slice(0)))
      .then((buf) => onBuf(buf))
